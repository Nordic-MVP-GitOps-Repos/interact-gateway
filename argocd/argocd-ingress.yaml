apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # Use IBM Cloud Kubernetes Service public ingress controller
    kubernetes.io/ingress.class: "public-iks-k8s-nginx"
    # Enable SSL passthrough for ArgoCD (it handles its own TLS)
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    # Backend protocol is HTTPS
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # Increase proxy buffer size for ArgoCD
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: public-iks-k8s-nginx
  rules:
  - host: argocd.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443
  tls:
  - hosts:
    - argocd.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud
    secretName: argocd-server-tls

