apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: custom-proxy-config
  namespace: envoy-gateway-system
spec:
  backendTLS:
    minVersion: "1.3"
    maxVersion: "1.3"
  # Required: Enable gateway merging for API Connect
  mergeGateways: true
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment: {}