apiVersion: nanogateway.apiconnect.ibm.com/v1beta1
kind: NanoGatewayCluster
metadata:
  name: idig-nanogw
  namespace: idig
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  mgmtEndpoint:
    gatewayClassName: envoy
    ingressClassName: ""
  imageRegistry: icr.io/idig
  template:
    - containers:
        - image: icr.io/idig/datapower-nano-management:1.0.0
          name: nanogw-management
      name: nanogw-management
    - containers:
        - image: icr.io/idig/datapower-nano-runtime:1.0.0
          name: nanogw-runtime-config
      name: nanogw-runtime-config
