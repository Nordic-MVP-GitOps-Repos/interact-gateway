apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: host-aliases-setter
  namespace: idig
  labels:
    app.kubernetes.io/name: host-aliases-setter
    app.kubernetes.io/component: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: host-aliases-setter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: host-aliases-setter
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: host-aliases-setter
          image: docker.io/library/busybox:1.36.1
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              ENTRY="20.54.238.192 ai.itzaks-nurmlarj.az.techzone.ibm.com idig.itzaks-nurmlarj.az.techzone.ibm.com"
              HOSTS=/proc/1/root/etc/hosts
              if ! grep -qF "$ENTRY" "$HOSTS"; then
                echo "$ENTRY" >> "$HOSTS"
              fi
              sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
