apiVersion: operator.external-secrets.io/v1alpha1
kind: OperatorConfig
metadata:
  name: external-secrets-operator
  namespace: openshift-operators
spec:
  # Deploy the main external-secrets controller
  externalSecrets:
    enabled: true
    image:
      repository: ghcr.io/external-secrets/external-secrets
      tag: v0.11.0
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  
  # Deploy the cert-controller for webhook certificates
  certController:
    enabled: true
    image:
      repository: ghcr.io/external-secrets/external-secrets
      tag: v0.11.0
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  
  # Deploy the webhook for validation
  webhook:
    enabled: true
    image:
      repository: ghcr.io/external-secrets/external-secrets
      tag: v0.11.0
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi